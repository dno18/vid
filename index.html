<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | المحمل الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #0070f3; 
            --bg: #050505; 
            --card: #121212; 
            --grad: linear-gradient(135deg, #0070f3, #f81ae5); 
            --border: #222;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; margin-top: 20px; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 900; font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }

        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        /* ستايل اختيار المنصة */
        .platform-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .platform-btn { 
            flex: 1; padding: 12px; border-radius: 15px; border: 1px solid var(--border); 
            background: #1a1a1a; color: #888; cursor: pointer; transition: 0.3s; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .platform-btn.active { 
            background: var(--p); color: #fff; border-color: var(--p); 
            box-shadow: 0 0 15px rgba(0, 112, 243, 0.3);
        }

        input { width: 100%; padding: 20px; border-radius: 18px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 16px; }
        input:focus { border-color: var(--p); }

        .main-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--grad); color: #fff; font-weight: 700; font-size: 17px; cursor: pointer; transition: 0.3s; }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #status { margin-top: 15px; text-align: center; color: #888; font-size: 13px; display: none; }

        #previewArea { display: none; margin-top: 25px; animation: slideUp 0.6s ease; }
        video { width: 100%; border-radius: 20px; border: 1px solid var(--border); background: #000; }
        
        .btn-save { display: block; margin-top: 15px; padding: 18px; background: #fff; color: #000; text-decoration: none; border-radius: 18px; font-weight: 900; font-size: 16px; width: 100%; cursor: pointer; text-align: center; }

        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .grid-item { position: relative; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: #000; aspect-ratio: 1; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-grid-save { position: absolute; bottom: 8px; right: 8px; padding: 6px 12px; background: rgba(0,0,0,0.8); border: none; border-radius: 10px; color: #fff; font-size: 12px; cursor: pointer; font-weight: bold; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Social Media Pro</h1>
            <p>حمل فيديوهاتك المفضلة بذكاء</p>
        </div>

        <div class="box">
            <div class="platform-selector">
                <button class="platform-btn active" onclick="setPlatform('tiktok', this)">TikTok</button>
                <button class="platform-btn" onclick="setPlatform('instagram', this)">Instagram</button>
            </div>

            <input type="text" id="vUrl" placeholder="الصق الرابط هنا...">
            
            <button id="mainBtn" class="main-btn" onclick="process()">جلب المحتوى</button>
            
            <div id="status"></div>
            
            <div id="previewArea">
                <div id="videoPreview" style="display:none;">
                    <video id="vPlayer" controls playsinline></video>
                    <button id="saveVideoBtn" class="btn-save" onclick="saveVideoToAlbum()">حفظ الفيديو في الألبوم 📥</button>
                </div>

                <div id="imagePreview" style="display:none;">
                    <p style="text-align:center; color:#ccc; margin-bottom:10px;">ألبوم صور مكتمل:</p>
                    <div class="image-grid" id="imageGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPlatform = 'tiktok';
        let currentResult = {};

        function setPlatform(p, btn) {
            currentPlatform = p;
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('vUrl').placeholder = `الصق رابط ${p === 'tiktok' ? 'تيك توك' : 'إنستقرام'} هنا`;
        }

        async function process() {
            const url = document.getElementById('vUrl').value.trim();
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('previewArea');
            const vPreview = document.getElementById('videoPreview');
            const iPreview = document.getElementById('imagePreview');
            const player = document.getElementById('vPlayer');
            const grid = document.getElementById('imageGrid');

            if(!url) return alert("أدخل الرابط أولاً");

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            status.style.display = "block";
            status.innerHTML = `جاري الجلب من ${currentPlatform}...`;
            preview.style.display = "none";
            vPreview.style.display = "none";
            iPreview.style.display = "none";
            grid.innerHTML = "";
            player.src = "";

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, platform: currentPlatform })
                });
                const data = await res.json();

                if(data.status === 'success') {
                    currentResult = data;
                    preview.style.display = "block";
                    status.innerHTML = "✓ تم العثور على المحتوى";

                    if (data.type === 'video') {
                        vPreview.style.display = "block";
                        const proxyPath = `/api/proxy?url=${encodeURIComponent(data.url)}&type=video`;
                        player.src = proxyPath;
                    } else if (data.type === 'image_album') {
                        iPreview.style.display = "block";
                        data.images.forEach((imgUrl, index) => {
                            const imgProxy = `/api/proxy?url=${encodeURIComponent(imgUrl)}&type=image`;
                            grid.innerHTML += `
                                <div class="grid-item">
                                    <img src="${imgProxy}">
                                    <button class="btn-grid-save" onclick="saveImageToAlbum('${imgUrl}', ${index})">حفظ</button>
                                </div>`;
                        });
                    }
                } else {
                    alert(`خطأ: ${data.message}`);
                    status.style.display = "none";
                }
            } catch(e) {
                alert("السيرفر لا يستجيب، حاول مجدداً.");
            } finally {
                btn.disabled = false;
                btn.innerText = "جلب المحتوى";
            }
        }

        async function saveVideoToAlbum() {
            if (!currentResult.url) return;
            const saveBtn = document.getElementById('saveVideoBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "جاري التحضير...";

            try {
                const proxyPath = `/api/proxy?url=${encodeURIComponent(currentResult.url)}&type=video`;
                const response = await fetch(proxyPath);
                const blob = await response.blob();
                const file = new File([blob], "video.mp4", { type: "video/mp4" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file] });
                } else {
                    window.open(proxyPath, '_blank');
                }
            } catch (error) {
                alert("فشل الحفظ التلقائي، اضغط مطولاً على الفيديو.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "حفظ الفيديو في الألبوم 📥";
            }
        }

        async function saveImageToAlbum(imgUrl, index) {
            try {
                const proxyPath = `/api/proxy?url=${encodeURIComponent(imgUrl)}&type=image`;
                const response = await fetch(proxyPath);
                const blob = await response.blob();
                const file = new File([blob], `img_${index}.jpg`, { type: "image/jpeg" });
                if (navigator.canShare) await navigator.share({ files: [file] });
            } catch (e) { alert("فشل الحفظ."); }
        }
    </script>
</body>
</html>
