<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | المحمل الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #050505; --card: #121212; --grad: linear-gradient(135deg, #0070f3, #f81ae5); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; margin-top: 30px; }
        h1 { font-weight: 900; font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; text-align: center; letter-spacing: -1px; }
        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid #222; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        input { width: 100%; padding: 20px; border-radius: 18px; border: 1px solid #333; background: #000; color: #fff; outline: none; transition: 0.3s; margin-bottom: 15px; text-align: center; font-size: 16px; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(0, 112, 243, 0.2); }
        button { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--grad); color: #fff; font-weight: 700; font-size: 17px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.96); }
        #previewArea { display: none; margin-top: 25px; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        video { width: 100%; border-radius: 20px; border: 1px solid #333; background: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .btn-save { display: block; margin-top: 15px; padding: 18px; background: #fff; color: #000; text-decoration: none; border-radius: 18px; font-weight: 900; font-size: 16px; border: none; width: 100%; cursor: pointer; }
        
        /* شبكة عرض الصور في حال الألبوم */
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .grid-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid #333; background: #000; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .btn-grid-save { position: absolute; bottom: 5px; right: 5px; padding: 5px; background: rgba(0,0,0,0.7); border: none; border-radius: 5px; color: #fff; font-size: 10px; cursor: pointer; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .loader { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <h1>Social Media Pro</h1>
        <div class="box">
            <input type="text" id="vUrl" placeholder="الصق رابط TikTok أو Instagram">
            <button id="mainBtn" onclick="process()">جلب المحتوى</button>
            <div id="status" style="margin-top:15px; text-align:center; color:#888; display:none; font-size:14px;"></div>
            
            <div id="previewArea">
                <div id="videoPreview" style="display:none;">
                    <video id="vPlayer" controls playsinline></video>
                    <button id="saveVideoBtn" class="btn-save" onclick="saveVideoToAlbum()">حفظ الفيديو في الألبوم 📥</button>
                </div>

                <div id="imagePreview" style="display:none;">
                    <p style="text-align:center; color:#ccc; margin-bottom:10px;">تم العثور على ألبوم صور:</p>
                    <div class="image-grid" id="imageGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentResult = {};

        async function process() {
            const url = document.getElementById('vUrl').value.trim();
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('previewArea');
            const videoPreview = document.getElementById('videoPreview');
            const imagePreview = document.getElementById('imagePreview');
            const player = document.getElementById('vPlayer');
            const grid = document.getElementById('imageGrid');

            if(!url) return alert("أدخل الرابط أولاً");

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            status.style.display = "block";
            status.innerHTML = "جاري الاتصال بالمحركات العالمية...";
            preview.style.display = "none";
            videoPreview.style.display = "none";
            imagePreview.style.display = "none";
            grid.innerHTML = "";
            player.src = "";

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if(data.status === 'success') {
                    currentResult = data;
                    preview.style.display = "block";
                    status.innerHTML = `✓ تم الجلب من ${data.platform === 'tiktok' ? 'تيك توك' : 'إنستقرام'}`;

                    if (data.type === 'video') {
                        videoPreview.style.display = "block";
                        // البروكسي ضروري لتجاوز حظر الآيفون
                        const proxyPath = `/api/proxy?url=${encodeURIComponent(data.url)}&type=video`;
                        player.src = proxyPath;
                    } else if (data.type === 'image_album') {
                        imagePreview.style.display = "block";
                        data.images.forEach((imgUrl, index) => {
                            const imgProxy = `/api/proxy?url=${encodeURIComponent(imgUrl)}&type=image`;
                            grid.innerHTML += `
                                <div class="grid-item">
                                    <img src="${imgProxy}">
                                    <button class="btn-grid-save" onclick="saveImageToAlbum('${imgUrl}', ${index})">حفظ</button>
                                </div>`;
                        });
                    }
                } else {
                    alert(`عذراً: ${data.message}`);
                }
            } catch(e) {
                alert("حدث خطأ في الاتصال بالسيرفر.");
            } finally {
                btn.disabled = false;
                btn.innerText = "جلب المحتوى";
            }
        }

        async function saveVideoToAlbum() {
            if (!currentResult.url) return;
            const saveBtn = document.getElementById('saveVideoBtn');
            const originalText = saveBtn.innerText;
            saveBtn.disabled = true;
            saveBtn.innerText = "جاري التحضير للألبوم...";

            try {
                const proxyPath = `/api/proxy?url=${encodeURIComponent(currentResult.url)}&type=video`;
                const response = await fetch(proxyPath);
                const blob = await response.blob();
                const file = new File([blob], "social_media_video.mp4", { type: "video/mp4" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'Video' });
                } else {
                    window.open(proxyPath, '_blank');
                }
            } catch (error) {
                alert("حدث خطأ، حاول الضغط مطولاً على الفيديو واختيار حفظ.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = originalText;
            }
        }

        async function saveImageToAlbum(imgUrl, index) {
            try {
                const proxyPath = `/api/proxy?url=${encodeURIComponent(imgUrl)}&type=image`;
                const response = await fetch(proxyPath);
                const blob = await response.blob();
                const file = new File([blob], `social_media_image_${index}.jpg`, { type: "image/jpeg" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'Image' });
                } else {
                    window.open(proxyPath, '_blank');
                }
            } catch (error) {
                alert("فشل حفظ الصورة.");
            }
        }
    </script>
</body>
</html>
