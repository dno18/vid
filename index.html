<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Downloader Pro | محمل الفيديوهات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b14;
            --card: #161625;
            --accent: #3b82f6;
            --accent-grad: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --text: #ffffff;
            --text-dim: #a0a0b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 450px; margin-top: 40px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; letter-spacing: -1px; margin-bottom: 8px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-dim); font-size: 14px; }

        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .input-box {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 2px solid #252538;
            background: #1e1e30;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
            text-align: left;
            direction: ltr;
        }
        .input-box:focus { border-color: var(--accent); background: #22223d; }
        .input-box::placeholder { text-align: right; direction: rtl; color: #666; }

        .main-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--accent-grad);
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        .main-btn:active { transform: scale(0.97); }
        .main-btn:disabled { opacity: 0.6; filter: grayscale(1); }

        #status { margin-top: 15px; font-size: 14px; text-align: center; display: none; color: var(--accent); }

        /* منطقة المعاينة */
        #previewWrap {
            margin-top: 25px;
            display: none;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            line-height: 0;
        }
        video { width: 100%; max-height: 450px; display: block; }

        .action-btns { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
        .btn-link {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            display: block;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .btn-save { background: #22c55e; color: #fff; }
        .btn-raw { background: rgba(255,255,255,0.05); color: #ccc; }

        .loader { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .grid-item { background: #1e1e30; padding: 5px; border-radius: 12px; border: 1px solid #333; }
        .grid-item img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Video Downloader</h1>
            <p>تنزيل فيديوهات تيك توك بجودة عالية وبدون علامة</p>
        </div>

        <div class="card">
            <input type="text" id="urlInput" placeholder="أدخل رابط vt.tiktok.com هنا...">
            <button class="main-btn" id="goBtn" onclick="startDownload()">
                <span>جلب الفيديو والمعاينة</span>
            </button>

            <div id="status"></div>

            <div id="previewWrap">
                <video id="player" controls playsinline preload="auto"></video>
            </div>

            <div id="resultActions" class="action-btns"></div>

            <div id="imageGrid" class="grid" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_ROOT = window.location.origin;

        async function startDownload() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();
            if (!url) return alert("يرجى لصق الرابط");

            const btn = document.getElementById('goBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('previewWrap');
            const player = document.getElementById('player');
            const actions = document.getElementById('resultActions');
            const grid = document.getElementById('imageGrid');

            // Reset UI
            btn.disabled = true;
            status.style.display = 'block';
            status.innerHTML = '<span class="loader"></span> جاري الاتصال بالمحرك العالمي...';
            preview.style.display = 'none';
            actions.innerHTML = '';
            grid.innerHTML = '';
            grid.style.display = 'none';
            player.src = '';

            try {
                const res = await fetch(`${API_ROOT}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (data.status === 'success' && data.url) {
                    status.innerHTML = '✓ تم جلب الفيديو بنجاح';
                    
                    // استخدام البروكسي المحلي لتشغيل الفيديو (حل مشكلة الآيفون)
                    const finalProxy = `${API_ROOT}/api/proxy?url=${encodeURIComponent(data.url)}`;
                    
                    player.src = finalProxy;
                    preview.style.display = 'block';
                    player.load();

                    actions.innerHTML = `
                        <button onclick="downloadProcess('${data.url}')" class="btn-link btn-save">حفظ الفيديو في الألبوم (iPhone)</button>
                        <a href="${finalProxy}" download="video.mp4" class="btn-link btn-raw">تنزيل مباشر</a>
                    `;
                } else if (data.status === 'picker') {
                    status.innerHTML = '✓ تم العثور على مجموعة صور:';
                    grid.style.display = 'grid';
                    data.picker.forEach(item => {
                        const imgUrl = `${API_ROOT}/api/proxy?url=${encodeURIComponent(item.url || item)}`;
                        grid.innerHTML += `
                            <div class="grid-item">
                                <img src="${imgUrl}">
                                <a href="${imgUrl}" download class="btn-link btn-raw" style="font-size:12px; padding:8px; margin-top:5px">حفظ</a>
                            </div>`;
                    });
                } else {
                    status.innerHTML = '✕ المحرك لم يستطع جلب الرابط، جرب رابطاً آخر.';
                }
            } catch (err) {
                status.innerHTML = '✕ فشل الاتصال بالسيرفر، تأكد من الرفع على Vercel.';
            } finally {
                btn.disabled = false;
            }
        }

        async function downloadProcess(videoUrl) {
            const proxyUrl = `${API_ROOT}/api/proxy?url=${encodeURIComponent(videoUrl)}`;
            
            // في الآيفون: أفضل طريقة هي فتح البروكسي في نافذة جديدة
            // سيقوم ملف proxy.js بإرسال Headers تجعل المتصفح يعرض خيار "تنزيل"
            try {
                const response = await fetch(proxyUrl);
                const blob = await response.blob();
                const file = new File([blob], "tiktok_video.mp4", { type: "video/mp4" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file] });
                } else {
                    window.open(proxyUrl, '_blank');
                }
            } catch (e) {
                window.open(proxyUrl, '_blank');
            }
        }
    </script>
</body>
</html>
