<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | v8.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #050505; --card: #121212; --grad: linear-gradient(135deg, #0070f3, #f81ae5); --border: #222; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 900; font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .platform-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .platform-btn { flex: 1; padding: 12px; border-radius: 15px; border: 1px solid var(--border); background: #1a1a1a; color: #888; cursor: pointer; font-weight: 700; font-size: 11px; }
        .platform-btn.active { background: var(--p); color: #fff; border-color: var(--p); }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; margin-bottom: 15px; }
        #fileZone { display: none; margin-bottom: 15px; }
        .upload-label { display: block; padding: 25px; border: 2px dashed #333; border-radius: 15px; text-align: center; color: #888; cursor: pointer; }
        .main-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--grad); color: #fff; font-weight: 900; cursor: pointer; }
        #previewArea { display: none; margin-top: 25px; }
        .media-container { border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #333; }
        img, video { width: 100%; display: block; }
        .btn-save { display: block; margin-top: 15px; padding: 15px; background: #fff; color: #000; border-radius: 15px; font-weight: 900; text-align: center; text-decoration: none; }
        .loader { display: none; margin: 20px 0; text-align: center; color: var(--p); font-weight: bold; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><h1>Social Media Pro</h1><p>امممممممم</p></div>
        <div class="box">
            <div class="platform-selector">
                <button id="tiktokBtn" class="platform-btn" onclick="setMode('tiktok')">TikTok</button>
                <button id="instagramBtn" class="platform-btn" onclick="setMode('instagram')">Instagram</button>
                <button id="aiBtn" class="platform-btn" onclick="setMode('ai')">توضيح الصور ✨</button>
            </div>
            <div id="ui-input">
                <input type="text" id="vUrl" placeholder="اختر المنصة" disabled>
                <div id="fileZone">
                    <label class="upload-label" for="imgInp">
                        <span id="lblTxt">اضغط لرفع الصورة 📸</span>
                        <input type="file" id="imgInp" accept="image/*" style="display:none" onchange="handleImage(this)">
                    </label>
                </div>
            </div>
            <button id="runBtn" class="main-btn" onclick="execute()" disabled>ابدأ الآن</button>
            <div id="status" class="loader">جاري المعالجة... يرجى الصبر ⏳</div>
            <div id="previewArea">
                <div class="media-container" id="resBox"></div>
                <a id="dlLink" class="btn-save" target="_blank">حفظ النتيجة 📥</a>
            </div>
        </div>
    </div>

    <script>
        let mode = null;
        let finalImage = null;

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(m === 'ai' ? 'aiBtn' : m + 'Btn').classList.add('active');
            document.getElementById('runBtn').disabled = false;
            document.getElementById('vUrl').style.display = (m === 'ai') ? 'none' : 'block';
            document.getElementById('fileZone').style.display = (m === 'ai') ? 'block' : 'none';
            if(m !== 'ai') { document.getElementById('vUrl').disabled = false; document.getElementById('vUrl').placeholder = "الصق الرابط هنا"; }
        }

        // دالة سحرية لضغط الصورة قبل الإرسال
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > 800) { height *= 800 / width; width = 800; } // تصغير الأبعاد
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        finalImage = canvas.toDataURL('image/jpeg', 0.7); // ضغط الجودة لـ 70%
                        document.getElementById('lblTxt').innerText = "✅ تم تجهيز الصورة";
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function execute() {
            const st = document.getElementById('status');
            const pre = document.getElementById('previewArea');
            const btn = document.getElementById('runBtn');
            st.style.display = 'block'; pre.style.display = 'none'; btn.disabled = true;

            try {
                if(mode === 'ai') {
                    if(!finalImage) throw new Error("ارفع صورة أولاً");
                    const r = await fetch('https://api.vkrdown.com/ai/upscale', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ image: finalImage })
                    });
                    const d = await r.json();
                    if(!d.url) throw new Error("السيرفر مشغول حالياً");
                    document.getElementById('resBox').innerHTML = `<img src="${d.url}">`;
                    document.getElementById('dlLink').href = d.url;
                } else {
                    const url = document.getElementById('vUrl').value;
                    const r = await fetch('/api/download', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ url, type: mode })
                    });
                    const d = await r.json();
                    if(d.status !== 'success') throw new Error(d.message);
                    document.getElementById('resBox').innerHTML = `<video src="/api/proxy?url=${encodeURIComponent(d.url)}&type=video" controls></video>`;
                }
                pre.style.display = 'block';
                st.innerText = "اكتمل! ✅";
            } catch(e) {
                alert(e.message);
                st.innerText = "❌ حدث خطأ";
            } finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
