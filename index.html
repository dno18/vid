<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Video Downloader Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Sora:wght@600&display=swap" rel="stylesheet">
<style>
    :root { --bg:#07070f; --card:#0e0e1c; --accent:#60a5fa; --text:#eef0fb; --border:rgba(255,255,255,0.07); --success:#6ee7b7; }
    body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; display:flex; flex-direction:column; align-items:center; padding:32px 16px; min-height:100vh; }
    .container { width:100%; max-width:480px; z-index:1; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:20px; margin-top:20px; }
    input[type=text] { width:100%; background:#14142a; border:1px solid var(--border); border-radius:12px; padding:15px; color:#fff; outline:none; margin-bottom:12px; direction:ltr; }
    .dl-btn { width:100%; padding:15px; background:linear-gradient(135deg,#3b82f6,#7c3aed); border:none; border-radius:12px; color:white; font-weight:700; cursor:pointer; }
    .notif { margin-top:12px; padding:12px; border-radius:10px; display:none; font-size:13px; }
    .result-area { margin-top:15px; display:flex; flex-direction:column; gap:10px; }
    .dl-link { display:flex; align-items:center; justify-content:center; padding:12px; background:rgba(110,231,183,0.1); border:1px solid var(--success); border-radius:12px; color:var(--success); text-decoration:none; font-weight:700; }
    .album-btn { background:rgba(96,165,250,0.1); border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-family:'Tajawal'; }
    .picker-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px; }
    .pitem { background:#14142a; padding:8px; border-radius:12px; text-align:center; }
    .pitem img { width:100%; border-radius:8px; aspect-ratio:1/1; object-fit:cover; }
    .spin { width:16px; height:16px; border:2px solid #60a5fa33; border-top-color:#60a5fa; border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center; font-family:'Sora';">Video Downloader</h1>
    <div class="card">
        <input type="text" id="urlIn" placeholder="الصق الرابط هنا (TikTok, IG, YT)">
        <button class="dl-btn" id="dlBtn" onclick="go()">جلب المحتوى</button>
        <div id="notif" class="notif"></div>
        <div id="result" class="result-area"></div>
        <div id="picker" class="picker-grid" style="display:none"></div>
    </div>
</div>

<script>
    var API_BASE = window.location.origin;

    function showNotif(msg, type) {
        const n = document.getElementById('notif');
        n.style.display = 'block';
        n.style.background = type === 'err' ? '#fca5a522' : '#60a5fa22';
        n.innerHTML = msg;
    }

    async function saveToAlbum(videoUrl) {
        const btn = document.getElementById('albumBtn');
        btn.innerHTML = '<span class="spin"></span> جاري التجهيز...';
        try {
            const proxyUrl = API_BASE + '/api/proxy?url=' + encodeURIComponent(videoUrl);
            const resp = await fetch(proxyUrl);
            const blob = await resp.blob();
            const file = new File([blob], "video.mp4", { type: "video/mp4" });
            if (navigator.share) {
                await navigator.share({ files: [file] });
            } else { alert("متصفحك لا يدعم الحفظ المباشر."); }
        } catch (e) { alert("خطأ في الحفظ"); }
        btn.innerHTML = "حفظ في الألبوم (iPhone)";
    }

    async function go() {
        const url = document.getElementById('urlIn').value.trim();
        if(!url) return showNotif("الرجاء وضع رابط", "err");
        
        document.getElementById('dlBtn').disabled = true;
        document.getElementById('result').innerHTML = '';
        document.getElementById('picker').style.display = 'none';
        showNotif('<span class="spin"></span> جاري البحث...', 'load');

        try {
            const res = await fetch(API_BASE + '/api/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url })
            });
            const data = await res.json();

            if(data.status === 'picker') {
                showNotif("تم العثور على صور", "ok");
                let h = '';
                data.picker.forEach(img => {
                    const pImg = API_BASE + '/api/proxy?url=' + encodeURIComponent(img.url);
                    h += `<div class="pitem"><img src="${pImg}"><a href="${pImg}" download class="dl-link" style="margin-top:5px; padding:5px; font-size:12px;">حفظ</a></div>`;
                });
                document.getElementById('picker').innerHTML = h;
                document.getElementById('picker').style.display = 'grid';
            } else if (data.url) {
                showNotif("جاهز للتحميل", "ok");
                const finalUrl = API_BASE + '/api/proxy?url=' + encodeURIComponent(data.url);
                document.getElementById('result').innerHTML = `
                    <a href="${finalUrl}" download="video.mp4" class="dl-link">تنزيل الفيديو (للملفات)</a>
                    <button id="albumBtn" class="dl-link album-btn" onclick="saveToAlbum('${data.url}')">حفظ في الألبوم (iPhone)</button>
                `;
            } else { showNotif("فشل العثور على محتوى", "err"); }
        } catch (e) { showNotif("خطأ في الاتصال", "err"); }
        document.getElementById('dlBtn').disabled = false;
    }
</script>
</body>
</html>
