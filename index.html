<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #050505; --card: #121212; --grad: linear-gradient(135deg, #0070f3, #f81ae5); --border: #222; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 900; font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        
        .platform-selector { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .platform-btn { flex: 1; min-width: 100px; padding: 12px; border-radius: 15px; border: 1px solid var(--border); background: #1a1a1a; color: #888; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 13px; }
        .platform-btn.active { background: var(--p); color: #fff; border-color: var(--p); box-shadow: 0 0 15px rgba(0,112,243,0.3); }
        
        .select-hint { font-size: 12px; color: #f81ae5; text-align: center; margin-bottom: 10px; display: block; font-weight: bold; }
        input { width: 100%; padding: 20px; border-radius: 18px; border: 2px solid var(--border); background: #000; color: #fff; outline: none; text-align: center; margin-bottom: 15px; }
        
        /* منطقة رفع الصور */
        #fileZone { display: none; margin-bottom: 15px; }
        .upload-label { display: block; padding: 30px; border: 2px dashed var(--border); border-radius: 18px; text-align: center; cursor: pointer; color: #888; transition: 0.3s; }
        .upload-label:hover { border-color: var(--p); color: #fff; }

        .main-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--grad); color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #previewArea { display: none; margin-top: 25px; }
        .media-container { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        video, img { width: 100%; display: block; max-height: 500px; }
        
        .btn-save { display: block; margin-top: 15px; padding: 18px; background: #fff; color: #000; border-radius: 18px; font-weight: 900; width: 100%; text-align: center; cursor: pointer; text-decoration: none; }

        .skeleton { display: none; margin-top: 25px; }
        .sk-media { width: 100%; height: 300px; background: #1a1a1a; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><h1>Social Media Pro</h1><p>تحميل وذكاء اصطناعي ✨</p></div>
        
        <div class="box">
            <span class="select-hint" id="hint">⚠️ اختر المنصة أولاً</span>
            <div class="platform-selector">
                <button id="tkBtn" class="platform-btn" onclick="setPlatform('tiktok')">TikTok</button>
                <button id="igBtn" class="platform-btn" onclick="setPlatform('instagram')">Instagram</button>
                <button id="aiBtn" class="platform-btn" onclick="setPlatform('ai')">توضيح الصور ✨</button>
            </div>
            
            <div id="inputGroup">
                <input type="text" id="vUrl" placeholder="الصق الرابط هنا" disabled>
                <div id="fileZone">
                    <label class="upload-label" for="imgInput">
                        <span id="fileLabelText">اضغط هنا لرفع صورة غير واضحة 📸</span>
                        <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleFile(this)">
                    </label>
                </div>
            </div>

            <button id="go" class="main-btn" onclick="run()" disabled>جلب المحتوى</button>
            <div id="status" style="margin-top:15px; text-align:center; font-size:13px; color:#888;"></div>
            <div id="skeleton" class="skeleton"><div class="sk-media"></div></div>

            <div id="previewArea">
                <div class="media-container" id="mediaBox">
                    </div>
                <button id="saveBtn" class="btn-save" onclick="downloadMe()">حفظ في الألبوم 📥</button>
            </div>
        </div>
    </div>

    <script>
        let selectedPlatform = null;
        let resData = {};
        let base64Image = null;

        function setPlatform(p) {
            selectedPlatform = p;
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(p === 'tiktok' ? 'tkBtn' : p === 'instagram' ? 'igBtn' : 'aiBtn').classList.add('active');
            
            const vUrl = document.getElementById('vUrl');
            const fileZone = document.getElementById('fileZone');
            const goBtn = document.getElementById('go');
            
            document.getElementById('hint').style.display = 'none';
            goBtn.disabled = false;

            if (p === 'ai') {
                vUrl.style.display = 'none';
                fileZone.style.display = 'block';
                goBtn.innerText = "توضيح الصورة الآن ✨";
            } else {
                vUrl.style.display = 'block';
                fileZone.style.display = 'none';
                vUrl.disabled = false;
                vUrl.placeholder = `الصق رابط ${p === 'tiktok' ? 'تيك توك' : 'انستقرام'} هنا`;
                goBtn.innerText = "جلب المحتوى";
            }
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result;
                    document.getElementById('fileLabelText').innerText = "✅ تم اختيار: " + input.files[0].name;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function run() {
            const st = document.getElementById('status');
            const pre = document.getElementById('previewArea');
            const sk = document.getElementById('skeleton');
            const btn = document.getElementById('go');

            let body = { type: selectedPlatform };

            if (selectedPlatform === 'ai') {
                if (!base64Image) return alert("يرجى اختيار صورة أولاً");
                body.image = base64Image;
                st.innerText = "جاري معالجة الصورة بالذكاء الاصطناعي... قد يستغرق الأمر 10 ثوانٍ";
            } else {
                const url = document.getElementById('vUrl').value.trim();
                if (!url) return alert("يرجى وضع الرابط");
                body.url = url;
                st.innerText = "جاري جلب الفيديو...";
            }

            btn.disabled = true;
            pre.style.display = 'none';
            sk.style.display = 'block';

            try {
                const r = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const d = await r.json();

                if (d.status === 'success') {
                    resData = d;
                    const mediaBox = document.getElementById('mediaBox');
                    
                    if (selectedPlatform === 'ai') {
                        mediaBox.innerHTML = `<img src="${d.url}" id="resImg">`;
                    } else {
                        mediaBox.innerHTML = `<video src="/api/proxy?url=${encodeURIComponent(d.url)}&type=video" id="player" controls playsinline></video>`;
                    }
                    
                    pre.style.display = 'block';
                    st.innerText = "اكتملت العملية بنجاح! ✅";
                } else {
                    st.innerText = "❌ " + d.message;
                }
            } catch (e) {
                st.innerText = "❌ حدث خطأ في السيرفر";
            } finally {
                sk.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function downloadMe() {
            const b = document.getElementById('saveBtn');
            b.innerText = "جاري التحميل...";
            try {
                const url = selectedPlatform === 'ai' ? resData.url : `/api/proxy?url=${encodeURIComponent(resData.url)}&type=video`;
                const r = await fetch(url);
                const blob = await r.blob();
                const ext = selectedPlatform === 'ai' ? 'jpg' : 'mp4';
                const file = new File([blob], `file.${ext}`, { type: blob.type });

                if (navigator.share) {
                    await navigator.share({ files: [file] });
                } else {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `social_pro_file.${ext}`;
                    a.click();
                }
            } catch (e) {
                alert("اضغط مطولاً على الوسائط للحفظ");
            } finally {
                b.innerText = "حفظ في الألبوم 📥";
            }
        }
    </script>
</body>
</html>
