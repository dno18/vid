<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Video Downloader | محمل الفيديوهات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #07070f; --card: #0e0e1c; --card2: #14142a;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #60a5fa; --text: #eef0fb; --muted: rgba(238, 240, 251, 0.42);
            --success: #6ee7b7; --error: #fca5a5;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 28px; }
        .logo-wrap {
            display: inline-flex; width: 66px; height: 66px; border-radius: 22px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            align-items: center; justify-content: center; margin-bottom: 14px;
            box-shadow: 0 0 40px rgba(96, 165, 250, 0.18);
        }
        h1 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: var(--muted); }

        /* Status bar */
        .status-bar {
            display: flex; align-items: center; gap: 8px; padding: 9px 14px;
            margin-bottom: 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); border-radius: 11px; font-size: 12px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #6ee7b7; }

        /* Main Card */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 12px; }
        .input-wrap { position: relative; margin-bottom: 12px; }
        input[type=text] {
            width: 100%; background: var(--card2); border: 1px solid var(--border);
            border-radius: 13px; padding: 14px 15px 14px 65px; font-size: 14px;
            color: var(--text); outline: none; direction: ltr; text-align: left;
        }
        input[type=text]::placeholder { direction: rtl; text-align: right; color: var(--muted); }
        
        .paste-btn {
            position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
            padding: 6px 12px; background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.15); border-radius: 9px;
            color: var(--accent); font-size: 11px; cursor: pointer;
        }

        .dl-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none; border-radius: 13px; color: white; font-size: 16px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Notifications & Results */
        .notif { margin-top: 12px; padding: 12px; border-radius: 12px; font-size: 13px; display: none; gap: 8px; align-items: center; }
        .notif.load { display: flex; background: rgba(96, 165, 250, 0.1); color: var(--accent); }
        .notif.err { display: flex; background: rgba(252, 165, 165, 0.1); color: var(--error); }
        
        .result-area { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .dl-link {
            display: flex; align-items: center; justify-content: center; padding: 13px;
            border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px;
        }
        .file-link { background: rgba(110, 231, 183, 0.1); border: 1px solid rgba(110, 231, 183, 0.2); color: var(--success); }
        .album-btn { background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.2); color: var(--accent); cursor: pointer; width: 100%; }

        .picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pitem { background: var(--card2); padding: 8px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .pitem img { width: 100%; border-radius: 8px; margin-bottom: 8px; aspect-ratio: 1; object-fit: cover; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { width: 16px; height: 16px; border: 2px solid rgba(96, 165, 250, 0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-wrap">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
        </div>
        <h1>Video Downloader</h1>
        <p class="subtitle">تنزيل الفيديوهات والصور بدون علامة مائية</p>
    </div>

    <div class="status-bar">
        <div class="dot"></div>
        <span>جاهز لاستقبال الروابط (بما فيها vt.tiktok)</span>
    </div>

    <div class="card">
        <div class="input-wrap">
            <input type="text" id="urlIn" placeholder="الصق رابط تيك توك هنا">
            <button class="paste-btn" onclick="doPaste()">لصق</button>
        </div>
        <button class="dl-btn" id="dlBtn" onclick="go()">تنزيل الآن</button>

        <div id="notif" class="notif"></div>
        <div id="result" class="result-area"></div>
        <div id="picker" class="picker-grid" style="display:none"></div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    function showNotif(type, msg) {
        const n = document.getElementById('notif');
        n.className = 'notif ' + type;
        n.innerHTML = type === 'load' ? `<div class="spin"></div> ${msg}` : msg;
        n.style.display = 'flex';
    }

    async function doPaste() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('urlIn').value = text;
        } catch (e) { document.getElementById('urlIn').focus(); }
    }

    async function saveToAlbum(videoUrl) {
        const btn = document.getElementById('albumBtn');
        const originalText = btn.innerText;
        btn.innerText = "جاري التحضير...";
        btn.disabled = true;

        try {
            // استخدام البروكسي لتحويل الرابط لملف (Blob)
            const proxyUrl = `${API_BASE}/api/proxy?url=${encodeURIComponent(videoUrl)}`;
            const res = await fetch(proxyUrl);
            const blob = await res.blob();
            const file = new File([blob], "video.mp4", { type: "video/mp4" });

            // محاولة استخدام ميزة المشاركة في الآيفون
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file] });
            } else {
                window.location.href = proxyUrl; // فتح مباشر إذا فشلت المشاركة
            }
        } catch (e) {
            alert("يرجى فتح الموقع في متصفح Safari لحفظ الفيديو في الألبوم.");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    async function go() {
        const url = document.getElementById('urlIn').value.trim();
        if(!url) return showNotif('err', 'الرجاء لصق الرابط أولاً');

        const btn = document.getElementById('dlBtn');
        btn.disabled = true;
        document.getElementById('result').innerHTML = '';
        document.getElementById('picker').style.display = 'none';
        showNotif('load', 'جاري جلب المحتوى...');

        try {
            const res = await fetch(`${API_BASE}/api/download`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();

            if (data.status === 'picker') {
                showNotif('load', 'تم العثور على مجموعة صور:');
                let h = '';
                data.picker.forEach(img => {
                    const pUrl = `${API_BASE}/api/proxy?url=${encodeURIComponent(img.url)}`;
                    h += `<div class="pitem"><img src="${pUrl}"><a href="${pUrl}" download class="dl-link file-link" style="padding:5px;font-size:12px">حفظ الصورة</a></div>`;
                });
                document.getElementById('picker').innerHTML = h;
                document.getElementById('picker').style.display = 'grid';
            } else if (data.url) {
                showNotif('load', '✓ جاهز للتنزيل');
                const finalProxy = `${API_BASE}/api/proxy?url=${encodeURIComponent(data.url)}`;
                document.getElementById('result').innerHTML = `
                    <a href="${finalProxy}" download="video.mp4" class="dl-link file-link">تنزيل كملف</a>
                    <button id="albumBtn" class="dl-link album-btn" onclick="saveToAlbum('${data.url}')">حفظ في الألبوم (iPhone)</button>
                `;
            } else {
                showNotif('err', 'فشل العثور على الفيديو. تأكد من الرابط.');
            }
        } catch (e) {
            showNotif('err', 'حدث خطأ في الاتصال بالسيرفر.');
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
