<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #050505; --card: #121212; --grad: linear-gradient(135deg, #0070f3, #f81ae5); --border: #222; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; }
        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-top: 20px; }
        .header h1 { text-align: center; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; }
        input { width: 100%; padding: 18px; border-radius: 15px; background: #000; border: 1px solid #222; color: #fff; text-align: center; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--p); }
        .main-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--grad); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; }
        .main-btn:disabled { opacity: 0.5; }
        #loading { display: none; text-align: center; margin: 15px 0; color: var(--p); font-weight: bold; }
        #previewArea { display: none; margin-top: 20px; }
        .media-container { border-radius: 20px; overflow: hidden; border: 1px solid #333; background: #000; }
        video { width: 100%; display: block; }
        .btn-save { display: block; margin-top: 15px; padding: 18px; background: #fff; color: #000; border-radius: 15px; font-weight: 900; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><h1>Social Downloader</h1></div>
        <div class="box">
            <input type="text" id="vUrl" placeholder="الصق رابط تيك توك أو إنستقرام">
            <button id="go" class="main-btn" onclick="download()">جلب الفيديو 📥</button>
            <div id="loading">جاري التحميل... ⏳</div>
        </div>
        <div id="previewArea">
            <div class="media-container"><video id="player" controls playsinline></video></div>
            <a id="dlLink" class="btn-save">حفظ الفيديو في الاستوديو 📲</a>
        </div> 
    </div>

    <script>
        async function download() {
            const url = document.getElementById('vUrl').value;
            const btn = document.getElementById('go');
            const ld = document.getElementById('loading');
            const pre = document.getElementById('previewArea');

            if(!url) return alert("يرجى لصق الرابط أولاً");

            btn.disabled = true;
            ld.style.display = 'block';
            pre.style.display = 'none';

            try {
                const r = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const d = await r.json();
                
                if(d.status === 'success') {
                    const proxiedUrl = `/api/proxy?url=${encodeURIComponent(d.url)}`;
                    document.getElementById('player').src = proxiedUrl;
                    document.getElementById('dlLink').href = proxiedUrl;
                    document.getElementById('dlLink').download = "video.mp4";
                    pre.style.display = 'block';
                } else {
                    alert(d.message || "فشل التحميل");
                }
            } catch(e) {
                alert("السيرفر لا يستجيب، حاول مرة أخرى");
            } finally {
                btn.disabled = false;
                ld.style.display = 'none';
            }
        }
    </script>
</body>
</html>
