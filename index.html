<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | v7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #050505; --card: #121212; --grad: linear-gradient(135deg, #0070f3, #f81ae5); --border: #222; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 900; font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        
        .platform-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .platform-btn { flex: 1; padding: 15px; border-radius: 18px; border: 1px solid var(--border); background: #1a1a1a; color: #888; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .platform-btn.active { background: var(--p); color: #fff; border-color: var(--p); box-shadow: 0 0 15px rgba(0,112,243,0.3); }
        
        /* تنبيه لاختيار المنصة */
        .select-hint { font-size: 12px; color: #f81ae5; text-align: center; margin-bottom: 10px; display: block; font-weight: bold; }

        input { width: 100%; padding: 20px; border-radius: 18px; border: 2px solid var(--border); background: #000; color: #fff; outline: none; text-align: center; margin-bottom: 15px; }
        .main-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--grad); color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .main-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }

        #previewArea { display: none; margin-top: 25px; }
        .media-container { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; }
        video { width: 100%; display: block; max-height: 500px; }
        
        .btn-save { display: block; margin-top: 15px; padding: 18px; background: #fff; color: #000; border-radius: 18px; font-weight: 900; width: 100%; text-align: center; cursor: pointer; }

        /* Skeleton Loading */
        .skeleton { display: none; margin-top: 25px; }
        .sk-media { width: 100%; height: 300px; background: #1a1a1a; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .history-section { margin-top: 30px; width: 100%; max-width: 420px; }
        .history-item { background: #121212; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><h1>Social Media Pro</h1><p>اختر المنصة وابدأ التحميل</p></div>
        
        <div class="box">
            <span class="select-hint" id="hint">⚠️ يجب اختيار المنصة أولاً</span>
            <div class="platform-selector">
                <button id="tkBtn" class="platform-btn" onclick="setPlatform('tiktok')">TikTok</button>
                <button id="igBtn" class="platform-btn" onclick="setPlatform('instagram')">Instagram</button>
            </div>
            
            <input type="text" id="vUrl" placeholder="الصق الرابط هنا" disabled>
            <button id="go" class="main-btn" onclick="run()" disabled>جلب المحتوى</button>
            
            <div id="status" style="margin-top:15px; text-align:center; font-size:13px; color:#888;"></div>

            <div id="skeleton" class="skeleton"><div class="sk-media"></div></div>

            <div id="previewArea">
                <div class="media-container">
                    <video id="player" controls playsinline preload="auto"></video>
                </div>
                <button id="saveBtn" class="btn-save" onclick="downloadMe()">حفظ في الألبوم 📥</button>
            </div>
        </div>

        <div id="historyList" class="history-section"></div>
    </div>

    <script>
        let selectedPlatform = null;
        let resData = {};

        function setPlatform(p) {
            selectedPlatform = p;
            document.getElementById('tkBtn').className = p==='tiktok'?'platform-btn active':'platform-btn';
            document.getElementById('igBtn').className = p==='instagram'?'platform-btn active':'platform-btn';
            
            // تفعيل الإدخال والزر بعد الاختيار
            document.getElementById('vUrl').disabled = false;
            document.getElementById('vUrl').placeholder = `الصق رابط ${p==='tiktok'?'تيك توك':'انستقرام'} هنا`;
            document.getElementById('go').disabled = false;
            document.getElementById('hint').style.display = 'none';
        }

        async function run() {
            const url = document.getElementById('vUrl').value.trim();
            if(!url) return alert("يرجى لصق الرابط");

            const btn = document.getElementById('go');
            const pre = document.getElementById('previewArea');
            const sk = document.getElementById('skeleton');
            const st = document.getElementById('status');

            btn.disabled = true;
            pre.style.display = 'none';
            sk.style.display = 'block';
            st.innerText = "جاري جلب الفيديو من السيرفر...";

            try {
                const r = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const d = await r.json();

                if(d.status === 'success') {
                    resData = d;
                    const videoSrc = `/api/proxy?url=${encodeURIComponent(d.url)}&type=video`;
                    const player = document.getElementById('player');
                    player.src = videoSrc;
                    player.load(); // إجبار المتصفح على تحميل الفيديو للمعاينة
                    
                    pre.style.display = 'block';
                    st.innerText = "جاهز للتحميل ✅";
                } else {
                    st.innerText = "❌ " + d.message;
                }
            } catch(e) {
                st.innerText = "❌ فشل الاتصال بالسيرفر";
            } finally {
                sk.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function downloadMe() {
            const b = document.getElementById('saveBtn');
            b.innerText = "جاري التحضير...";
            b.disabled = true;
            try {
                const pUrl = `/api/proxy?url=${encodeURIComponent(resData.url)}&type=video`;
                const r = await fetch(pUrl);
                const blob = await r.blob();
                const file = new File([blob], "video.mp4", { type: "video/mp4" });
                
                if (navigator.share) {
                    await navigator.share({ files: [file] });
                } else {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "video.mp4";
                    a.click();
                }
            } catch (e) {
                alert("استخدم زر المشاركة أو اضغط مطولاً على الفيديو");
            } finally {
                b.innerText = "حفظ في الألبوم 📥";
                b.disabled = false;
            }
        }
    </script>
</body>
</html>
