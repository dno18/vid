<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Downloader | محمل التيك توك الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #7c3aed;
            --bg: #07070f;
            --card-bg: #0e0e1c;
            --input-bg: #14142a;
            --text: #ffffff;
            --success: #22c55e;
            --error: #fca5a5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container { width: 100%; max-width: 480px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; font-weight: 700; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; font-size: 14px; margin-top: 5px; }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group { margin-bottom: 15px; position: relative; }
        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #2d2d44;
            background: var(--input-bg);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: left;
            direction: ltr;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(59,130,246,0.15); }
        input::placeholder { text-align: right; direction: rtl; color: #555; }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.97); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        #status { margin-top: 15px; font-size: 14px; text-align: center; display: none; }

        /* منطقة المعاينة */
        .preview-container {
            margin-top: 20px;
            display: none;
            background: #000;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
        }
        video { width: 100%; max-height: 450px; display: block; background: #000; }

        .actions { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-save { background: rgba(34, 197, 94, 0.1); color: var(--success); border-color: rgba(34, 197, 94, 0.2); }
        .btn-download { background: rgba(255, 255, 255, 0.05); color: #ccc; border-color: rgba(255,255,255,0.1); }

        .picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .picker-item { background: var(--input-bg); padding: 5px; border-radius: 12px; border: 1px solid #333; }
        .picker-item img { width: 100%; border-radius: 8px; display: block; }

        .loader { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Video Downloader</h1>
            <p>تنزيل فيديوهات وصور تيك توك بدون علامة مائية</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="الصق الرابط (vt.tiktok.com)">
            </div>
            
            <button class="btn-main" id="fetchBtn" onclick="process()">
                <span id="btnText">جلب المحتوى والمعاينة</span>
            </button>

            <div id="status"></div>

            <div id="previewArea" class="preview-container">
                <video id="player" controls playsinline preload="metadata"></video>
            </div>

            <div id="actionArea" class="actions"></div>

            <div id="imagePicker" class="picker-grid" style="display: none;"></div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        async function process() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();
            if (!url) return alert("الرجاء إدخال الرابط");

            const btn = document.getElementById('fetchBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('previewArea');
            const player = document.getElementById('player');
            const actions = document.getElementById('actionArea');
            const picker = document.getElementById('imagePicker');

            // إعادة تعيين الواجهة
            btn.disabled = true;
            status.style.display = 'block';
            status.style.color = 'var(--primary)';
            status.innerHTML = '<span class="loader"></span> جاري معالجة الرابط وفك التشفير...';
            preview.style.display = 'none';
            actions.innerHTML = '';
            picker.innerHTML = '';
            picker.style.display = 'none';
            player.src = '';

            try {
                const response = await fetch(`${BASE_URL}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await response.json();

                if (data.status === 'success' && data.url) {
                    status.innerHTML = '✓ تم جلب الفيديو بنجاح';
                    const proxyUrl = `${BASE_URL}/api/proxy?url=${encodeURIComponent(data.url)}`;
                    
                    // إعداد المعاينة
                    player.src = proxyUrl;
                    preview.style.display = 'block';
                    player.load();

                    // إضافة الأزرار
                    actions.innerHTML = `
                        <button onclick="saveVideo('${data.url}')" class="btn-action btn-save">حفظ في الألبوم (iPhone)</button>
                        <a href="${proxyUrl}" download="tiktok_video.mp4" class="btn-action btn-download">تنزيل كملف مباشر</a>
                    `;
                } else if (data.status === 'picker') {
                    status.innerHTML = '✓ تم العثور على مجموعة صور:';
                    picker.style.display = 'grid';
                    data.picker.forEach(item => {
                        const imgProxy = `${BASE_URL}/api/proxy?url=${encodeURIComponent(item.url)}`;
                        picker.innerHTML += `
                            <div class="picker-item">
                                <img src="${imgProxy}">
                                <a href="${imgProxy}" download class="btn-action btn-download" style="padding: 6px; font-size: 11px; margin-top: 5px;">حفظ الصورة</a>
                            </div>`;
                    });
                } else {
                    status.style.color = 'var(--error)';
                    status.innerHTML = '✕ فشل العثور على الفيديو. تأكد من الرابط.';
                }
            } catch (err) {
                status.style.color = 'var(--error)';
                status.innerHTML = '✕ حدث خطأ في الاتصال بالسيرفر.';
            } finally {
                btn.disabled = false;
            }
        }

        async function saveVideo(rawUrl) {
            const status = document.getElementById('status');
            const proxyUrl = `${BASE_URL}/api/proxy?url=${encodeURIComponent(rawUrl)}`;
            
            status.innerHTML = '<span class="loader"></span> جاري التحضير للألبوم...';

            try {
                const res = await fetch(proxyUrl);
                const blob = await res.blob();
                const file = new File([blob], "video.mp4", { type: "video/mp4" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file] });
                    status.innerHTML = '✓ اكتملت العملية';
                } else {
                    // إذا كان المتصفح لا يدعم المشاركة (مثل داخل تطبيقات)
                    window.location.href = proxyUrl;
                    alert("اضغط مطولاً على الفيديو في المعاينة واختر 'حفظ الفيديو'.");
                }
            } catch (e) {
                window.location.href = proxyUrl;
            }
        }
    </script>
</body>
</html>
