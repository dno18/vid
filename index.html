<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #0070f3; 
            --bg: #050505; 
            --card: #121212; 
            --grad: linear-gradient(135deg, #0070f3, #f81ae5); 
            --border: #222;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Tajawal', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            min-height: 100vh; 
        }
        .app { width: 100%; max-width: 420px; margin-top: 10px; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 900; font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #666; font-size: 13px; margin-top: 5px; }

        .box { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 30px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
        }

        /* اختيار المنصة */
        .platform-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .platform-btn { 
            flex: 1; padding: 14px; border-radius: 18px; border: 1px solid var(--border); 
            background: #1a1a1a; color: #888; cursor: pointer; transition: 0.3s; font-weight: 700;
        }
        .platform-btn.active { 
            background: var(--p); color: #fff; border-color: var(--p); 
            box-shadow: 0 0 20px rgba(0, 112, 243, 0.3);
        }

        .input-group { position: relative; margin-bottom: 15px; }
        input { 
            width: 100%; padding: 20px; border-radius: 18px; border: 2px solid var(--border); 
            background: #000; color: #fff; outline: none; transition: 0.3s; 
            text-align: center; font-size: 15px; 
        }
        input:focus { border-color: var(--p); }

        .main-btn { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            background: var(--grad); color: #fff; font-weight: 700; 
            font-size: 17px; cursor: pointer; transition: 0.3s; 
        }
        .main-btn:active { transform: scale(0.98); }

        #status { margin-top: 15px; text-align: center; color: #888; font-size: 13px; min-height: 20px; }

        #previewArea { display: none; margin-top: 25px; animation: slideUp 0.5s ease; }
        .media-container { 
            border-radius: 20px; overflow: hidden; border: 1px solid var(--border); 
            background: #000; position: relative;
        }
        video { width: 100%; display: block; max-height: 500px; }
        
        .btn-save { 
            display: block; margin-top: 15px; padding: 18px; background: #fff; 
            color: #000; border-radius: 18px; font-weight: 900; 
            font-size: 16px; width: 100%; cursor: pointer; text-align: center; border: none;
        }

        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .grid-item { position: relative; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-grid-save { position: absolute; bottom: 5px; right: 5px; padding: 5px 10px; background: var(--p); border: none; border-radius: 8px; color: #fff; font-size: 11px; cursor: pointer; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Social Media Pro</h1>
            <p>تحميل الذكاء الاصطناعي - تيك توك وإنستقرام</p>
        </div>

        <div class="box">
            <div class="platform-selector">
                <button id="btn-tiktok" class="platform-btn active" onclick="setPlatform('tiktok')">TikTok</button>
                <button id="btn-insta" class="platform-btn" onclick="setPlatform('instagram')">Instagram</button>
            </div>

            <div class="input-group">
                <input type="text" id="vUrl" placeholder="الصق الرابط هنا..." spellcheck="false">
            </div>
            
            <button id="mainBtn" class="main-btn" onclick="process()">جلب المحتوى</button>
            
            <div id="status"></div>
            
            <div id="previewArea">
                <div id="videoPreview" style="display:none;">
                    <div class="media-container">
                        <video id="vPlayer" controls playsinline></video>
                    </div>
                    <button id="saveVideoBtn" class="btn-save" onclick="saveVideoToAlbum()">حفظ الفيديو في الألبوم 📥</button>
                </div>

                <div id="imagePreview" style="display:none;">
                    <p style="text-align:center; color:#888; font-size:13px; margin-bottom:10px;">تم العثور على ألبوم صور:</p>
                    <div class="image-grid" id="imageGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentResult = {};
        let selectedPlatform = 'tiktok';

        function setPlatform(p) {
            selectedPlatform = p;
            document.getElementById('btn-tiktok').classList.toggle('active', p === 'tiktok');
            document.getElementById('btn-insta').classList.toggle('active', p === 'instagram');
            document.getElementById('vUrl').placeholder = `الصق رابط ${p === 'tiktok' ? 'تيك توك' : 'إنستقرام'} هنا`;
        }

        async function process() {
            let url = document.getElementById('vUrl').value.trim();
            
            // حل مشكلة السلاش الزائد الموضحة في الصورة
            url = url.replace(/^[\/\s]+/, ''); 

            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('previewArea');
            const vPreview = document.getElementById('videoPreview');
            const iPreview = document.getElementById('imagePreview');
            const player = document.getElementById('vPlayer');
            const grid = document.getElementById('imageGrid');

            if(!url || !url.includes('http')) return alert("من فضلك أدخل رابطاً صحيحاً");

            // إعادة ضبط الواجهة
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> جاري المعالجة...';
            status.innerHTML = "جاري تنظيف الرابط وفحص الخوادم...";
            preview.style.display = "none";
            vPreview.style.display = "none";
            iPreview.style.display = "none";
            grid.innerHTML = "";
            player.src = "";

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if(data.status === 'success') {
                    currentResult = data;
                    status.innerHTML = `<span style="color:#4caf50">✓ تم العثور على المحتوى من ${data.platform}</span>`;
                    preview.style.display = "block";

                    if (data.type === 'video') {
                        vPreview.style.display = "block";
                        const proxyPath = `/api/proxy?url=${encodeURIComponent(data.url)}&type=video`;
                        player.src = proxyPath;
                        player.load(); // إجبار المشغل على الاستجابة
                    } else if (data.type === 'image_album') {
                        iPreview.style.display = "block";
                        data.images.forEach((imgUrl, index) => {
                            const imgProxy = `/api/proxy?url=${encodeURIComponent(imgUrl)}&type=image`;
                            grid.innerHTML += `
                                <div class="grid-item">
                                    <img src="${imgProxy}">
                                    <button class="btn-grid-save" onclick="saveImageToAlbum('${imgUrl}', ${index})">حفظ</button>
                                </div>`;
                        });
                    }
                } else {
                    status.innerHTML = `<span style="color:#ff4b2b">✕ ${data.message || "الرابط غير مدعوم"}</span>`;
                }
            } catch(e) {
                status.innerHTML = `<span style="color:#ff4b2b">✕ حدث خطأ في الاتصال بالسيرفر</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "جلب المحتوى";
            }
        }

        async function saveVideoToAlbum() {
            if (!currentResult.url) return;
            const saveBtn = document.getElementById('saveVideoBtn');
            const originalText = "حفظ الفيديو في الألبوم 📥";
            
            saveBtn.disabled = true;
            saveBtn.innerText = "جاري التحميل للألبوم...";

            try {
                const proxyPath = `/api/proxy?url=${encodeURIComponent(currentResult.url)}&type=video`;
                const response = await fetch(proxyPath);
                const blob = await response.blob();
                const file = new File([blob], "video_pro.mp4", { type: "video/mp4" });

                if (navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file] });
                } else {
                    // فتح الرابط المباشر كحل أخير إذا فشل الـ Share
                    const a = document.createElement('a');
                    a.href = proxyPath;
                    a.download = "video.mp4";
                    a.click();
                }
            } catch (error) {
                alert("حدث خطأ. يمكنك الضغط مطولاً على الفيديو واختيار 'حفظ الفيديو'.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = originalText;
            }
        }

        async function saveImageToAlbum(imgUrl, index) {
            try {
                const proxyPath = `/api/proxy?url=${encodeURIComponent(imgUrl)}&type=image`;
                const response = await fetch(proxyPath);
                const blob = await response.blob();
                const file = new File([blob], `image_${index}.jpg`, { type: "image/jpeg" });
                if (navigator.share) await navigator.share({ files: [file] });
            } catch (e) { alert("فشل الحفظ."); }
        }
    </script>
</body>
</html>
