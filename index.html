<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Pro | v9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display= swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #050505; --card: #121212; --grad: linear-gradient(135deg, #0070f3, #f81ae5); --border: #222; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app { width: 100%; max-width: 420px; }
        .box { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-top: 20px; }
        .header h1 { text-align: center; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .platform-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .platform-btn { flex: 1; padding: 12px 6px; border-radius: 15px; border: 1px solid var(--border); background: #1a1a1a; color: #888; cursor: pointer; font-weight: 700; font-size: 11px; font-family: 'Tajawal', sans-serif; transition: all 0.2s; }
        .platform-btn.active { background: var(--p); color: #fff; border-color: var(--p); }
        .upload-area { border: 2px dashed #333; border-radius: 20px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: var(--p); }
        .upload-placeholder { padding: 30px; text-align: center; color: #888; }
        .upload-area img { width: 100%; display: block; max-height: 300px; object-fit: contain; background: #000; }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 15px; background: #000; border: 1px solid #222; color: #fff; text-align: center; font-family: 'Tajawal', sans-serif; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: var(--p); }
        .main-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--grad); color: #fff; font-weight: 900; cursor: pointer; margin-top: 15px; font-family: 'Tajawal', sans-serif; font-size: 16px; transition: opacity 0.2s; }
        .main-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* شريط التحميل */
        #loadingBox { display: none; margin-top: 20px; text-align: center; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; background: var(--grad); border-radius: 10px; animation: progressAnim 3s ease-in-out infinite; }
        @keyframes progressAnim { 0%{width:5%} 50%{width:80%} 100%{width:95%} }
        .loading-text { color: #888; font-size: 14px; font-weight: 700; }

        /* نتيجة التوضيح */
        #enhanceResult { display: none; margin-top: 20px; }
        .compare-label { font-size: 12px; color: #555; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .compare-box { border-radius: 15px; overflow: hidden; border: 1px solid #333; background: #000; }
        .compare-box img { width: 100%; display: block; max-height: 200px; object-fit: contain; }
        .compare-box .label { font-size: 11px; text-align: center; padding: 6px; color: #888; font-weight: 700; }
        .enhanced-full { border-radius: 15px; overflow: hidden; border: 1px solid #0070f3; margin-bottom: 15px; }
        .enhanced-full img { width: 100%; display: block; }
        .btn-save { display: block; padding: 18px; background: #fff; color: #000; border-radius: 15px; font-weight: 900; font-family: 'Tajawal', sans-serif; cursor: pointer; border: none; width: 100%; font-size: 15px; text-align: center; }

        /* نتيجة الفيديو */
        #previewArea { display: none; margin-top: 20px; }
        .media-container { border-radius: 20px; overflow: hidden; border: 1px solid #333; background: #000; margin-bottom: 15px; }
        video { width: 100%; display: block; }
    </style>
</head>
<body>
<div class="app">
    <div class="header" style="margin-bottom:20px;">
        <h1 style="font-size:28px; margin-bottom:4px;">Social Media Pro</h1>
        <p style="text-align:center; color:#555; font-size:13px;">v9.0</p>
    </div>

    <div class="box">
        <div class="platform-selector">
            <button id="tkBtn"  class="platform-btn" onclick="setMode('tiktok')">🎵 TikTok</button>
            <button id="igBtn"  class="platform-btn" onclick="setMode('instagram')">📸 Instagram</button>
            <button id="aiBtn"  class="platform-btn" onclick="setMode('ai')">✨ توضيح الصور</button>
        </div>

        <!-- قسم الرابط (TikTok / Instagram) -->
        <div id="urlSection" style="display:none;">
            <input type="text" id="vUrl" placeholder="الصق الرابط هنا">
        </div>

        <!-- قسم رفع الصورة -->
        <div id="fileSection" style="display:none;">
            <div class="upload-area" onclick="document.getElementById('imgInp').click()">
                <div class="upload-placeholder" id="uploadPlaceholder">
                    <div style="font-size:40px; margin-bottom:10px;">🖼️</div>
                    <p style="font-weight:700; font-size:14px;">اضغط لرفع الصورة</p>
                    <p style="font-size:12px; margin-top:6px; color:#555;">JPG • PNG • WEBP</p>
                </div>
                <img id="previewImg" src="" style="display:none;" alt="preview">
            </div>
            <input type="file" id="imgInp" accept="image/*" style="display:none" onchange="handleImg(this)">
        </div>

        <button id="go" class="main-btn" onclick="process()" disabled>ابدأ</button>
    </div>

    <!-- شريط التحميل -->
    <div id="loadingBox" class="box" style="margin-top:15px; padding:20px;">
        <p class="loading-text" id="loadingText">⏳ جاري المعالجة...</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <!-- نتيجة توضيح الصورة -->
    <div id="enhanceResult" class="box">
        <p style="font-weight:900; font-size:15px; margin-bottom:15px; text-align:center;">✅ تم التوضيح بنجاح</p>
        <div class="compare-grid">
            <div class="compare-box">
                <div class="label">قبل</div>
                <img id="beforeImg" src="" alt="before">
            </div>
            <div class="compare-box">
                <div class="label" style="color:#0070f3;">بعد ✨</div>
                <img id="afterImg" src="" alt="after">
            </div>
        </div>
        <p style="font-size:12px; color:#555; text-align:center; margin-bottom:12px;">الصورة الكاملة بعد التوضيح</p>
        <div class="enhanced-full"><img id="afterFull" src="" alt="enhanced full"></div>
        <button class="btn-save" onclick="saveEnhanced()">حفظ الصورة المحسّنة 📥</button>
    </div>

    <!-- نتيجة الفيديو -->
    <div id="previewArea" class="box">
        <div class="media-container"><video id="player" controls playsinline></video></div>
        <button class="btn-save" onclick="saveVideo()">حفظ الفيديو 📥</button>
    </div>
</div>

<script>
    let mode = '';
    let currentBase64 = '';
    let currentMime = 'image/jpeg';
    let enhancedBase64 = '';
    let videoUrl = '';

    function setMode(m) {
        mode = m;
        ['tkBtn','igBtn','aiBtn'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(m === 'ai' ? 'aiBtn' : m === 'tiktok' ? 'tkBtn' : 'igBtn').classList.add('active');

        document.getElementById('urlSection').style.display  = m !== 'ai' ? 'block' : 'none';
        document.getElementById('fileSection').style.display = m === 'ai' ? 'block' : 'none';

        document.getElementById('enhanceResult').style.display = 'none';
        document.getElementById('previewArea').style.display   = 'none';
        document.getElementById('loadingBox').style.display    = 'none';

        const btn = document.getElementById('go');
        btn.innerText = m === 'ai' ? 'توضيح الصورة ✨' : 'جلب الفيديو';
        btn.disabled  = m === 'ai' ? !currentBase64 : false;
    }

    function handleImg(input) {
        if (!input.files?.[0]) return;
        const file = input.files[0];
        currentMime = file.type || 'image/jpeg';
        const r = new FileReader();
        r.onload = e => {
            currentBase64 = e.target.result.split(',')[1];
            document.getElementById('uploadPlaceholder').style.display = 'none';
            const prev = document.getElementById('previewImg');
            prev.src = e.target.result;
            prev.style.display = 'block';
            document.getElementById('go').disabled = false;
        };
        r.readAsDataURL(file);
    }

    async function process() {
        const btn = document.getElementById('go');
        const loadBox = document.getElementById('loadingBox');
        const loadTxt = document.getElementById('loadingText');

        btn.disabled = true;
        loadBox.style.display = 'block';
        document.getElementById('enhanceResult').style.display = 'none';
        document.getElementById('previewArea').style.display   = 'none';

        try {
            if (mode === 'ai') {
                if (!currentBase64) { alert('ارفع صورة أولاً'); return; }
                loadTxt.innerText = '🔍 جاري تحليل وتوضيح الصورة بالذكاء الاصطناعي...';

                const r = await fetch('/api/enhance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: currentBase64, mediaType: currentMime })
                });
                const data = await r.json();

                if (data.status !== 'success') throw new Error(data.message || 'فشل التوضيح');

                // عرض النتيجة
                const before = 'data:' + currentMime + ';base64,' + currentBase64;
                let after = '';

                if (data.imageBase64) {
                    after = 'data:' + (data.mediaType || 'image/png') + ';base64,' + data.imageBase64;
                    enhancedBase64 = data.imageBase64;
                } else if (data.outputUrl) {
                    after = data.outputUrl;
                    enhancedBase64 = null; // سيتم الحفظ من URL
                }

                document.getElementById('beforeImg').src  = before;
                document.getElementById('afterImg').src   = after;
                document.getElementById('afterFull').src  = after;
                document.getElementById('enhanceResult').style.display = 'block';

            } else {
                const url = document.getElementById('vUrl').value.trim();
                if (!url) { alert('أدخل الرابط أولاً'); return; }
                loadTxt.innerText = '⬇️ جاري جلب الفيديو...';

                const r = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await r.json();

                if (data.status !== 'success') throw new Error(data.message || 'فشل جلب الفيديو');

                videoUrl = data.url;
                document.getElementById('player').src = `/api/proxy?url=${encodeURIComponent(data.url)}&type=video`;
                document.getElementById('previewArea').style.display = 'block';
            }

        } catch (e) {
            alert('❌ ' + e.message);
        } finally {
            btn.disabled  = false;
            loadBox.style.display = 'none';
        }
    }

    function saveEnhanced() {
        const img = document.getElementById('afterFull');
        const a = document.createElement('a');

        if (enhancedBase64) {
            a.href     = 'data:image/png;base64,' + enhancedBase64;
            a.download = 'enhanced.png';
        } else {
            a.href     = img.src;
            a.download = 'enhanced.jpg';
        }
        a.click();
    }

    async function saveVideo() {
        const btn = document.querySelector('#previewArea .btn-save');
        btn.innerText = 'جاري التحضير...';
        btn.disabled  = true;
        try {
            const r    = await fetch(`/api/proxy?url=${encodeURIComponent(videoUrl)}&type=video`);
            const blob = await r.blob();
            const file = new File([blob], 'video.mp4', { type: 'video/mp4' });

            if (navigator.share && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'حفظ الفيديو' });
            } else {
                const a = document.createElement('a');
                a.href     = URL.createObjectURL(blob);
                a.download = 'video.mp4';
                a.click();
            }
        } catch { alert("اضغط مطولاً على الفيديو واختر 'حفظ الفيديو'"); }
        finally { btn.innerText = 'حفظ الفيديو 📥'; btn.disabled = false; }
    }
</script>
</body>
</html>
