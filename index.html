<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تنزيل فيديوهات تيك توك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
        body { background:#0a0a0c; color:#fff; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; }
        .wrapper { width:100%; max-width:400px; margin-top:50px; }
        .card { background:#161618; border-radius:25px; padding:25px; border:1px solid #222; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
        h1 { text-align:center; margin-bottom:20px; font-size:22px; color:#3b82f6; }
        input { width:100%; padding:15px; border-radius:15px; border:1px solid #333; background:#202022; color:#fff; margin-bottom:15px; outline:none; text-align:left; direction:ltr; }
        input::placeholder { text-align:right; direction:rtl; }
        button { width:100%; padding:15px; border-radius:15px; border:none; background:#3b82f6; color:#fff; font-weight:700; cursor:pointer; font-size:16px; transition:0.3s; }
        button:disabled { background:#555; opacity:0.6; }
        
        /* مشغل المعاينة */
        #previewBox { margin-top:20px; display:none; border-radius:15px; overflow:hidden; border:1px solid #3b82f6; background:#000; }
        video { width:100%; display:block; max-height:400px; }
        
        .status { margin-top:15px; text-align:center; font-size:14px; color:#888; }
        .actions { margin-top:15px; display:flex; flex-direction:column; gap:10px; }
        .btn-dl { display:block; text-align:center; padding:12px; border-radius:10px; text-decoration:none; font-weight:700; font-size:14px; background:#22c55e; color:#fff; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>TikTok Downloader</h1>
    <div class="card">
        <input type="text" id="urlInput" placeholder="ضع الرابط هنا (vt.tiktok)">
        <button id="btn" onclick="startDownload()">تنزيل الفيديو</button>
        
        <div id="msg" class="status"></div>

        <div id="previewBox">
            <video id="vPlayer" controls playsinline></video>
        </div>

        <div id="res" class="actions"></div>
    </div>
</div>

<script>
    async function startDownload() {
        const url = document.getElementById('urlInput').value.trim();
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');
        const res = document.getElementById('res');
        const pBox = document.getElementById('previewBox');
        const player = document.getElementById('vPlayer');

        if(!url) return alert("أدخل الرابط");

        btn.disabled = true;
        msg.innerHTML = "جاري جلب الفيديو من السيرفر العالمي...";
        msg.style.display = "block";
        res.innerHTML = "";
        pBox.style.display = "none";

        try {
            // استخدام API خارجي مباشر لتجنب حظر Vercel (نفس فكرة المواقع الكبيرة)
            const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`);
            const json = await response.json();

            if(json.code === 0 && json.data) {
                const videoUrl = json.data.hdplay || json.data.play;
                
                // حل مشكلة المعاينة في الآيفون: استخدام بروكسي خارجي عام
                // هذا يتجاوز حظر أبل للشاشة السوداء
                const finalUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=604800&url=${encodeURIComponent(videoUrl)}`;

                player.src = finalUrl;
                pBox.style.display = "block";
                msg.innerHTML = "✓ تم العثور على الفيديو";

                res.innerHTML = `
                    <a href="${videoUrl}" target="_blank" class="btn-dl">تنزيل بجودة عالية HD</a>
                    <p style="font-size:10px; color:#555; margin-top:5px; text-align:center;">في آيفون: اضغط مطولاً على الفيديو في المعاينة ثم اختر حفظ</p>
                `;
            } else {
                msg.innerHTML = "✕ فشل الجلب، الرابط قد يكون خاصاً أو معطلاً";
            }
        } catch(e) {
            msg.innerHTML = "✕ خطأ في الاتصال، جرب مرة أخرى";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
