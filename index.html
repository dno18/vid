<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Video Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f;--card:#0e0e1c;--card2:#14142a;
  --border:rgba(255,255,255,0.07);
  --accent:#60a5fa;--accent2:#a78bfa;
  --text:#eef0fb;--muted:rgba(238,240,251,0.42);
  --success:#6ee7b7;--error:#fca5a5;--warn:#fcd34d;
}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;overflow-x:hidden;position:relative;}
body::before{content:'';position:fixed;top:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(96,165,250,0.07) 0%,transparent 65%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(167,139,250,0.07) 0%,transparent 65%);pointer-events:none;z-index:0;}
.container{width:100%;max-width:480px;position:relative;z-index:1;}
.header{text-align:center;margin-bottom:32px;}
.logo-wrap{display:inline-flex;width:68px;height:68px;border-radius:22px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 0 40px rgba(96,165,250,0.2);animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
h1{font-family:'Sora',sans-serif;font-size:23px;font-weight:600;letter-spacing:-0.3px;margin-bottom:4px;}
.subtitle{font-size:13px;color:var(--muted);}
.badges{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.badge{display:flex;align-items:center;gap:5px;padding:5px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--muted);transition:all 0.25s;}
.badge svg{width:12px;height:12px;flex-shrink:0;}
.badge.ayt{border-color:rgba(255,0,0,0.45);color:#ff5555;background:rgba(255,0,0,0.06);}
.badge.aig{border-color:rgba(225,48,108,0.45);color:#e1306c;background:rgba(225,48,108,0.06);}
.badge.att{border-color:rgba(200,200,200,0.4);color:#d0d0d0;background:rgba(255,255,255,0.05);}
.inst-bar{display:flex;align-items:center;gap:7px;padding:8px 13px;margin-bottom:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;font-size:11.5px;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;transition:background 0.3s;}
.dot.green{background:#6ee7b7;}.dot.amber{background:#fcd34d;}.dot.red{background:#fca5a5;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.dot.loading{background:#60a5fa;animation:pulse 1s infinite;}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px 20px;margin-bottom:13px;}
.input-wrap{position:relative;margin-bottom:13px;}
.input-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);width:21px;height:21px;opacity:0.4;pointer-events:none;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s;}
.input-icon.lit{opacity:1;}
.paste-btn{position:absolute;left:9px;top:50%;transform:translateY(-50%);padding:5px 11px;background:rgba(96,165,250,0.1);border:none;border-radius:8px;color:var(--accent);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.paste-btn:hover{background:rgba(96,165,250,0.2);}
input[type=text]{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px 44px 13px 65px;font-size:13px;font-family:'Sora',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s,background 0.2s;direction:ltr;text-align:left;}
input[type=text]::placeholder{color:var(--muted);font-family:'Sora',sans-serif;}
input[type=text]:focus{border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.025);}
.quality-row{display:flex;gap:6px;margin-bottom:13px;}
.q-btn{flex:1;padding:8px 4px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:11.5px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all 0.2s;}
.q-btn.sel{background:rgba(96,165,250,0.1);border-color:var(--accent);color:var(--accent);font-weight:700;}
.dl-btn{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#7c3aed);border:none;border-radius:13px;color:white;font-size:16px;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 24px rgba(59,130,246,0.2);}
.dl-btn:hover{opacity:0.9;}.dl-btn:active{transform:scale(0.975);}.dl-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.status{margin-top:12px;padding:11px 14px;border-radius:11px;font-size:13.5px;display:none;align-items:center;gap:8px;line-height:1.4;}
.status.loading{display:flex;background:rgba(96,165,250,0.07);border:1px solid rgba(96,165,250,0.2);color:var(--accent);}
.status.success{display:flex;background:rgba(110,231,183,0.07);border:1px solid rgba(110,231,183,0.2);color:var(--success);}
.status.error{display:flex;background:rgba(252,165,165,0.07);border:1px solid rgba(252,165,165,0.2);color:var(--error);}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;border:2px solid rgba(96,165,250,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;flex-shrink:0;}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px;}
.picker-item{padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:11px;cursor:pointer;text-align:center;transition:all 0.2s;text-decoration:none;color:var(--text);display:block;}
.picker-item:hover{border-color:var(--accent);background:rgba(96,165,250,0.05);}
.picker-item img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:7px;margin-bottom:6px;}
.picker-label{font-size:11.5px;color:var(--muted);}
.foot{text-align:center;font-size:11.5px;color:var(--muted);line-height:1.65;padding:0 4px;}
</style>
</head>

<script>
var INST_LIST_URL='https://instances.cobalt.best/api/instances.json';
var FALLBACK=['https://cobalt.api.timelessnesses.me','https://cobalt.drgns.space','https://capi.7tv.app','https://cobalt.ggtyler.dev','https://cobalt.rocks'];

var IC={

};
var CHECK='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

function detect(u){if(/youtube\.com|youtu\.be/.test(u))return'yt';if(/instagram\.com/.test(u))return'ig';if(/tiktok\.com/.test(u))return'tt';return null;}
function setDot(cls,txt){document.getElementById('dot').className='dot '+cls;document.getElementById('instTxt').textContent=txt;}
function shortHost(u){return u.replace('https://','').split('/')[0];}

async function discoverInstances(){
  setDot('loading','جارٍ تحديد الخادم...');
  try{
    var r=await fetch(INST_LIST_URL,{signal:AbortSignal.timeout(5000)});
    var data=await r.json();
    var good=data.filter(function(i){return i.online&&i.info&&i.info.auth===false&&i.info.cors===true;});
    good.sort(function(a,b){return(b.score||0)-(a.score||0);});
    instList=good.map(function(i){return i.protocol+'://'+i.api;});
  }catch(e){instList=[];}
  FALLBACK.forEach(function(f){if(instList.indexOf(f)===-1)instList.push(f);});
  // quick probe of top candidate
  if(instList.length){
    try{
      var r2=await fetch(instList[0]+'/',{signal:AbortSignal.timeout(3500)});
      if(r2.ok||r2.status===405){activeInst=instList[0];setDot('green','خادم: '+shortHost(activeInst));return;}
    }catch(e){}
  }
  setDot('amber','جاهز · سيختار خادماً تلقائياً');
}

async function tryDownload(body){
  var toTry=activeInst?[activeInst].concat(instList.filter(function(x){return x!==activeInst;})):instList;
  var lastErr='لا يوجد خادم متاح حالياً';
  for(var i=0;i<Math.min(toTry.length,7);i++){
    var inst=toTry[i];
    if(!inst)continue;
    showSt('loading','<div class="spin"></div> جارٍ المحاولة... ('+shortHost(inst)+')');
    try{
      var r=await fetch(inst+'/',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body),signal:AbortSignal.timeout(12000)});
      var txt=await r.text();
      var d;try{d=JSON.parse(txt);}catch(e){continue;}
      if(d.status==='error'){
        var em={'error.api.link.invalid':'الرابط غير صحيح','error.api.fetch.fail':'تعذّر جلب الفيديو من المنصة','error.api.link.unsupported':'هذه المنصة غير مدعومة هنا','error.api.content.too_long':'الفيديو طويل جداً'};
        lastErr=em[d.error&&d.error.code]||(d.error&&d.error.code)||'خطأ غير معروف';
        if(d.error&&(d.error.code==='error.api.link.invalid'||d.error.code==='error.api.link.unsupported'))return{err:lastErr};
        continue;
      }
      if(d.url||d.status==='picker'){activeInst=inst;setDot('green','خادم: '+shortHost(inst));return d;}
    }catch(e){continue;}
  }
  return{err:lastErr};
}

document.getElementById('urlIn').addEventListener('input',function(){
  var p=detect(this.value);
  var ic=document.getElementById('pIcon');
  ic.innerHTML=p?IC[p]:IC.link;ic.classList.toggle('lit',!!p);
  ['yt','ig','tt'].forEach(function(x){document.getElementById('b'+x).className='badge'+(p===x?' a'+x:'');});
  document.getElementById('qRow').style.display=p==='yt'?'flex':'none';
});

async function doPaste(){
  try{var t=await navigator.clipboard.readText();var i=document.getElementById('urlIn');i.value=t;i.dispatchEvent(new Event('input'));}
  catch(e){document.getElementById('urlIn').focus();}
}

function setQ(btn,q){Q=q;document.querySelectorAll('.q-btn').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');}

function showSt(type,html){var el=document.getElementById('st');el.className='status '+type;el.innerHTML=html;}

async function go(){
  var url=document.getElementById('urlIn').value.trim();
  if(!url){showSt('error',CROSS+' الرجاء إدخال رابط الفيديو');return;}
  var btn=document.getElementById('dlBtn');
  btn.disabled=true;document.getElementById('picker').innerHTML='';
  var body={url:url};
  var p=detect(url);
  if(p==='yt')body.videoQuality=Q;
  var d=await tryDownload(body);
  if(d.err){showSt('error',CROSS+' '+d.err);btn.disabled=false;return;}
  if(d.status==='picker'&&d.picker&&d.picker.length){
    showSt('success',CHECK+' اختر الملف المطلوب');
    var html='<div class="picker-grid">';
    d.picker.forEach(function(item,i){html+='<a href="'+item.url+'" target="_blank" rel="noopener" class="picker-item">'+(item.thumb?'<img src="'+item.thumb+'" alt="" loading="lazy">':'')+'<div class="picker-label">'+(item.type==='video'?'فيديو':'صورة')+' '+(i+1)+'</div></a>';});
    html+='</div>';document.getElementById('picker').innerHTML=html;
  } else if(d.url){
    showSt('loading','<div class="spin"></div> جارٍ فتح التنزيل...');
    var a=document.createElement('a');a.href=d.url;a.download='video';a.target='_blank';a.rel='noopener';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){showSt('success',CHECK+' تم! احفظ الفيديو في ألبومك');},1500);
  }
  btn.disabled=false;
}

discoverInstances();
</script>
</body>
</html>
