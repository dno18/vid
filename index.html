<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Video Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f;--card:#0e0e1c;--card2:#14142a;
  --border:rgba(255,255,255,0.07);
  --accent:#60a5fa;--text:#eef0fb;--muted:rgba(238,240,251,0.42);
  --success:#6ee7b7;--error:#fca5a5;--warn:#fcd34d;
}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px}
body::before{content:'';position:fixed;top:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(96,165,250,0.06) 0%,transparent 65%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(167,139,250,0.06) 0%,transparent 65%);pointer-events:none}
.container{width:100%;max-width:480px;position:relative;z-index:1}

/* Header */
.header{text-align:center;margin-bottom:28px}
.logo-wrap{display:inline-flex;width:66px;height:66px;border-radius:22px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 0 40px rgba(96,165,250,0.18)}
h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--muted)}
.badges{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.badge{display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--muted)}
.badge svg{width:12px;height:12px;flex-shrink:0}
.badge.yt{border-color:rgba(255,60,60,0.4);color:#ff5555;background:rgba(255,0,0,0.05)}
.badge.ig{border-color:rgba(225,48,108,0.4);color:#e1306c;background:rgba(225,48,108,0.05)}
.badge.tt{border-color:rgba(200,200,200,0.3);color:#ccc;background:rgba(255,255,255,0.04)}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;margin-bottom:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:11px;font-size:12px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0;transition:background 0.3s}
.dot.green{background:#6ee7b7}.dot.amber{background:#fcd34d}.dot.red{background:#fca5a5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.dot.loading{background:#60a5fa;animation:pulse 1s infinite}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:22px 18px;margin-bottom:12px}

/* Input */
.input-wrap{position:relative;margin-bottom:12px}
.url-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none;display:flex;align-items:center}
.paste-btn{position:absolute;left:9px;top:50%;transform:translateY(-50%);padding:6px 12px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.15);border-radius:9px;color:var(--accent);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:background 0.2s}
.paste-btn:hover{background:rgba(96,165,250,0.18)}
input[type=text]{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:14px 42px 14px 68px;font-size:13px;font-family:'Sora',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;direction:ltr;text-align:left}
input[type=text]::placeholder{color:var(--muted);font-family:'Tajawal',sans-serif;direction:rtl;text-align:right}
input[type=text]:focus{border-color:rgba(96,165,250,0.4)}

/* Quality */
.q-row{display:flex;gap:6px;margin-bottom:12px}
.qb{flex:1;padding:8px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:11.5px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all 0.2s}
.qb.sel{background:rgba(96,165,250,0.1);border-color:var(--accent);color:var(--accent);font-weight:700}

/* Download button */
.dl-btn{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#7c3aed);border:none;border-radius:13px;color:white;font-size:16px;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 24px rgba(59,130,246,0.18)}
.dl-btn:hover{opacity:0.9}.dl-btn:active{transform:scale(0.975)}.dl-btn:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none}

/* Notification */
.notif{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:13px;display:none;align-items:flex-start;gap:9px;line-height:1.55}
.notif.load{display:flex;background:rgba(96,165,250,0.07);border:1px solid rgba(96,165,250,0.2);color:var(--accent)}
.notif.ok{display:flex;background:rgba(110,231,183,0.07);border:1px solid rgba(110,231,183,0.2);color:var(--success)}
.notif.err{display:flex;background:rgba(252,165,165,0.07);border:1px solid rgba(252,165,165,0.2);color:var(--error)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;min-width:16px;border:2px solid rgba(96,165,250,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}

/* Result & New Buttons */
.result-area{margin-top:10px}
.dl-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:rgba(110,231,183,0.07);border:1px solid rgba(110,231,183,0.22);border-radius:12px;color:var(--success);text-decoration:none;font-size:14px;font-weight:700;transition:background 0.2s;}
.dl-link:hover{background:rgba(110,231,183,0.13)}
.tip-box{margin-top:8px;padding:10px 13px;background:rgba(252,211,77,0.06);border:1px solid rgba(252,211,77,0.18);border-radius:10px;font-size:11.5px;color:var(--warn);line-height:1.65}

/* أزرار النتائج الجديدة */
.btn-group { display: flex; flex-direction: column; gap: 8px; }
.album-btn { background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.25); color: var(--accent); width: 100%; cursor: pointer; font-family: 'Tajawal', sans-serif; }
.album-btn:hover { background: rgba(96, 165, 250, 0.18); }
.album-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Picker */
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pitem{display:block;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:11px;text-align:center;text-decoration:none;color:var(--text);transition:border-color 0.2s}
.pitem:hover{border-color:var(--accent)}
.pitem img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:7px;margin-bottom:6px}
.pitem-lbl{font-size:11px;color:var(--muted)}

.foot{text-align:center;font-size:11.5px;color:var(--muted);line-height:1.7;margin-top: 20px;}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-wrap">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="7 10 12 15 17 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Video Downloader</h1>
    <p class="subtitle">حمّل من أي منصة · بدون علامة مائية</p>
    <div class="badges">
      <div class="badge yt">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.5 3.55 12 3.55 12 3.55s-7.5 0-9.38.5A3.02 3.02 0 00.5 6.19C0 8.07 0 12 0 12s0 3.93.5 5.81a3.02 3.02 0 002.12 2.14c1.88.5 9.38.5 9.38.5s7.5 0 9.38-.5a3.02 3.02 0 002.12-2.14C24 15.93 24 12 24 12s0-3.93-.5-5.81zM9.55 15.57V8.43L15.82 12l-6.27 3.57z"/></svg>
        YouTube
      </div>
      <div class="badge ig">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        Instagram
      </div>
      <div class="badge tt">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
        TikTok
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot green" id="dot"></div>
    <span id="statusTxt">جاهز للتنزيل</span>
  </div>

  <div class="card">
    <div class="input-wrap">
      <div class="url-icon">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
      </div>
      <input type="text" id="urlIn" placeholder="الصق رابط الفيديو هنا" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="paste-btn" onclick="doPaste()">لصق</button>
    </div>

    <div class="q-row" id="qRow" style="display:none">
      <button class="qb sel" onclick="setQ(this,'1080')">1080p</button>
      <button class="qb" onclick="setQ(this,'720')">720p</button>
      <button class="qb" onclick="setQ(this,'480')">480p</button>
      <button class="qb" onclick="setQ(this,'360')">360p</button>
    </div>

    <button class="dl-btn" id="dlBtn" onclick="go()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      تنزيل الفيديو
    </button>

    <div class="notif" id="notif"></div>
    <div class="result-area" id="result"></div>
    <div class="picker-grid" id="picker" style="display:none"></div>
  </div>

  <p class="foot">يعمل مع YouTube · Instagram · TikTok · Twitter/X وأكثر</p>
</div>

<script>
// ⚠️ غيّر هذا الرابط بعد رفع المشروع على Vercel
// مثال: https://your-project.vercel.app
var API_BASE = window.location.origin;

var Q = '1080';

function detect(u) {
  if (/youtube\.com|youtu\.be/.test(u)) return 'yt';
  if (/instagram\.com/.test(u)) return 'ig';
  if (/tiktok\.com/.test(u)) return 'tt';
  return null;
}

document.getElementById('urlIn').addEventListener('input', function () {
  var p = detect(this.value);
  document.getElementById('qRow').style.display = p === 'yt' ? 'flex' : 'none';
});

async function doPaste() {
  try {
    var t = await navigator.clipboard.readText();
    var inp = document.getElementById('urlIn');
    inp.value = t;
    inp.dispatchEvent(new Event('input'));
  } catch (e) {
    document.getElementById('urlIn').focus();
  }
}

function setQ(btn, q) {
  Q = q;
  document.querySelectorAll('.qb').forEach(function (b) { b.classList.remove('sel'); });
  btn.classList.add('sel');
}

function showNotif(type, html) {
  var el = document.getElementById('notif');
  el.className = 'notif ' + type;
  el.innerHTML = html;
}

// دالة جلب الفيديو ومشاركته للألبوم (مخصصة للآيفون)
async function saveToAlbum(url) {
  var btn = document.getElementById('albumBtn');
  var originalContent = btn.innerHTML;
  
  // تغيير شكل الزر لإظهار حالة التحميل
  btn.innerHTML = '<div class="spin" style="width:16px;height:16px;border-color:rgba(96,165,250,0.3);border-top-color:currentColor"></div> جاري التجهيز للألبوم...';
  btn.disabled = true;

  try {
    // جلب الفيديو من البروكسي كملف (Blob)
    var proxyUrl = '/api/proxy?url=' + encodeURIComponent(url);
    var response = await fetch(proxyUrl);
    var blob = await response.blob();
    
    // تحويل الـ Blob إلى File لكي يفهمه نظام iOS كفيديو حقيقي
    var file = new File([blob], 'video.mp4', { type: 'video/mp4' });

    // فتح صفحة المشاركة (Share Sheet)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'حفظ الفيديو'
      });
    } else {
      alert('متصفحك لا يدعم الحفظ المباشر للألبوم. يرجى استخدام زر "تنزيل للملفات".');
    }
  } catch (err) {
    console.error(err);
    alert('حدث خطأ أثناء التجهيز. قد يكون حجم الفيديو كبيراً جداً، استخدم التنزيل العادي.');
  }

  // إعادة الزر لشكله الطبيعي
  btn.innerHTML = originalContent;
  btn.disabled = false;
}

async function go() {
  var url = document.getElementById('urlIn').value.trim();
  if (!url) { showNotif('err', '⚠ الرجاء إدخال رابط الفيديو'); return; }

  var btn = document.getElementById('dlBtn');
  btn.disabled = true;
  document.getElementById('result').innerHTML = '';
  document.getElementById('picker').style.display = 'none';
  document.getElementById('picker').innerHTML = '';

  showNotif('load', '<div class="spin"></div> جارٍ جلب الفيديو...');

  var body = { url: url };
  if (detect(url) === 'yt') body.videoQuality = Q;

  try {
    var response = await fetch(API_BASE + '/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(30000),
    });

    var data = await response.json();

    if (!response.ok || data.error) {
      showNotif('err', '✕ ' + (data.error || 'حدث خطأ غير متوقع'));
      btn.disabled = false;
      return;
    }

    if (data.status === 'picker' && data.picker && data.picker.length) {
      showNotif('ok', '✓ اختر الملف المطلوب');
      var html = '';
      data.picker.forEach(function (item, i) {
        html += '<a href="' + item.url + '" target="_blank" rel="noopener" class="pitem">';
        if (item.thumb) html += '<img src="' + item.thumb + '" alt="" loading="lazy">';
        html += '<div class="pitem-lbl">' + (item.type === 'video' ? 'فيديو' : 'صورة') + ' ' + (i + 1) + '</div></a>';
      });
      var pg = document.getElementById('picker');
      pg.innerHTML = html;
      pg.style.display = 'grid';

    } else if (data.url) {
      showNotif('ok', '✓ الرابط جاهز!');
      var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
      
      var tipText = isMobile
        ? 'للحفظ في الاستديو (الآيفون): اضغط على "تنزيل للألبوم" ثم اختر "حفظ الفيديو" (Save Video).'
        : 'اضغط الزر · أو كليك يمين ← "Save link as" لاختيار مكان الحفظ';

      var proxyUrl = '/api/proxy?url=' + encodeURIComponent(data.url);

      document.getElementById('result').innerHTML =
        '<div class="btn-group">' +
          '<a href="' + proxyUrl + '" download class="dl-link">' +
            '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            'تنزيل للملفات (عادي)' +
          '</a>' +
          '<button id="albumBtn" class="dl-link album-btn" onclick="saveToAlbum(\'' + data.url + '\')">' +
            '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>' +
            'تنزيل للألبوم (iOS)' +
          '</button>' +
        '</div>' +
        '<div class="tip-box">' + tipText + '</div>';
    }

  } catch (err) {
    showNotif('err', '✕ انتهت مهلة الاتصال أو حدث خطأ في الشبكة');
  }

  btn.disabled = false;
}
</script>
</body>
</html>
