<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Pro Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0070f3; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app { width: 100%; max-width: 450px; text-align: center; }
        h1 { font-weight: 900; font-size: 32px; background: linear-gradient(to right, #0070f3, #f81ae5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .box { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; outline: none; transition: 0.3s; margin-bottom: 15px; text-align: center; }
        input:focus { border-color: var(--p); }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--p); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.96); }
        #preview { display: none; margin-top: 25px; animation: slideUp 0.5s ease; }
        video { width: 100%; border-radius: 20px; border: 1px solid #333; background: #000; }
        .dl-btn { display: block; margin-top: 15px; padding: 15px; background: #fff; color: #000; text-decoration: none; border-radius: 15px; font-weight: 700; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { width: 20px; height: 20px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <h1>TikTok Pro</h1>
        <div class="box">
            <input type="text" id="url" placeholder="ضع رابط الفيديو هنا">
            <button id="btn" onclick="download()">جلب الفيديو</button>
            <div id="status" style="margin-top:15px; color:#888; display:none"></div>
            <div id="preview">
                <video id="player" controls playsinline></video>
                <a id="save" class="dl-btn">حفظ الفيديو في الألبوم</a>
            </div>
        </div>
    </div>

    <script>
        async function download() {
            const url = document.getElementById('url').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');
            const player = document.getElementById('player');
            const saveBtn = document.getElementById('save');

            if(!url) return alert("أدخل الرابط!");

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            status.style.display = "block";
            status.innerHTML = "جاري التحليل وتجاوز القيود...";

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if(data.status === 'success') {
                    const finalUrl = `/api/proxy?url=${encodeURIComponent(data.url)}`;
                    player.src = finalUrl;
                    saveBtn.href = finalUrl;
                    preview.style.display = "block";
                    status.innerHTML = "✓ تم التجهيز بنجاح";
                    player.play();
                } else {
                    alert("فشل الجلب، جرب رابطاً آخر");
                }
            } catch(e) {
                alert("حدث خطأ في السيرفر");
            } finally {
                btn.disabled = false;
                btn.innerText = "جلب الفيديو";
            }
        }
    </script>
</body>
</html>
